<div class="signup-container">
  <p-card class="signup-card">
    <h2 class="title">Create Account</h2>
    <div class="form">
      <p-floatlabel>
        <input pInputText [(ngModel)]="name" id="name" />
        <label for="name">Full Name</label>
      </p-floatlabel>
      <p-floatlabel>
        <input pInputText [(ngModel)]="email" id="email" />
        <label for="email">Email</label>
      </p-floatlabel>
      <p-floatlabel>
        <input pInputText type="password" [(ngModel)]="password" id="password" />
        <label for="password">Password</label>
      </p-floatlabel>
      <p-floatlabel>
        <input pInputText [(ngModel)]="phone" id="phone" />
        <label for="phone">Phone Number</label>
      </p-floatlabel>
      <button 
        pButton 
        type="button" 
        label="Signup" 
        class="signup-btn"
        (click)="signup()">
      </button>
      <p *ngIf="message" class="message">{{ message }}</p>
      <p class="login-link">
        Already have an account?
        <a routerLink="/login">Login</a>
      </p>
    </div>
  </p-card>
</div>
